<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ex004.css">
    <title>Treino - JS</title>
</head>
<body>
    <div class="div_flex">
        <script>
            const nome = window.prompt('Qual é o seu nome? ')
            document.write(`<p class="dados">Olá, ${nome}! Seu nome tem ${nome.length} letras!</p>`)
            document.write(`<p class="dados">Seu nome em maiúsculas é ${nome.toUpperCase()}</p>`)
        </script>
    </div>
</body>
</html>
