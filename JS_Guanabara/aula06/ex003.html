<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ex003.css">
    <title>Treino - JS</title>
</head>
<body>
    <h1>Treinando JavaScript!</h1>
    <p>Olá, Mundo!</p>

    <!-- Fazendo JS interno para primeira aprendizagem -->
    <script>
        const numero1 = Number.parseInt(window.prompt('Digite o primeiro número: '))
        const numero2 = Number.parseInt(window.prompt('Digite o segundo número: '))
        const soma = numero1 + numero2
        window.alert(`A soma dos valores é ${soma}`)    
        // numero + numero = adição
        // string + string = concatenação
        // string + numero = concatenação
    </script>
</body>
</html>
