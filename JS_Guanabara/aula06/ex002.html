<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ex002.css">
    <title>Treino - JS</title>
</head>
<body>
    <h1>Treinando JavaScript!</h1>
    <p>Olá, Mundo!</p>

    <!-- Fazendo JS interno para primeira aprendizagem -->

        const nome = window.prompt('Qual é o seu nome?')
        window.alert(`É um grande prazer em te conhecer, ${nome}!`)
    </script>
